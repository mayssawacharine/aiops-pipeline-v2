name: Collect Synthetic Metrics

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

jobs:
  generate-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests
      - name: Generate synthetic metrics row
        run: |
          mkdir -p artifacts
          python - <<'PY'
          import csv, os, random, time
          status = random.choice(['success','success','success','failed'])
          duration = random.choice([35, 42, 50, 57, 145, 170])
          failed_tests = 0 if status == 'success' else random.randint(1,5)
          row = {
              'run_id': os.environ.get('GITHUB_RUN_ID'),
              'branch': os.environ.get('GITHUB_REF_NAME'),
              'status': status,
              'duration_seconds': duration,
              'failed_tests': failed_tests,
              'created_at': int(time.time())
          }
          file = 'artifacts/synthetic_metrics.csv'
          exists = os.path.exists(file)
          with open(file, 'a', newline='') as f:
              writer = csv.DictWriter(f, fieldnames=row.keys())
              if not exists:
                  writer.writeheader()
              writer.writerow(row)
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: synthetic-metrics
          path: artifacts/synthetic_metrics.csv
