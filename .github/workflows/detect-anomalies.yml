name: Detect CI Anomalies

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Fetch workflow metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: python scripts/fetch_metrics.py
      - name: Train model
        run: python scripts/train_model.py
      - name: Detect latest run
        id: detect
        run: |
          python scripts/detect_latest_run.py > detection_output.json
          cat detection_output.json
      - name: Upload detection artifact
        uses: actions/upload-artifact@v4
        with:
          name: latest-detection
          path: |
            data/latest_detection.json
            data/scored_runs.csv
            data/anomalies.png
      - name: Mark anomaly
        run: |
          python - <<'PY'
          import json, sys
          with open('data/latest_detection.json') as f:
              result = json.load(f)
          if result['anomaly_label'] == -1:
              print('::warning title=Anomaly Detected::Latest CI run looks anomalous')
          else:
              print('Latest run looks normal')
          PY
